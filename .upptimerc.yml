# Upptime-config voor de Argus Backup-statuspagina.
# Externe meting via GitHub Actions (elke 5 min), site via GitHub Pages.
owner: it-totaal
repo: status

sites:
  - name: Website (argusbackup.io)
    url: https://argusbackup.io
  - name: Demo environment
    url: https://demo.argusbackup.io

status-website:
  cname: status.argusbackup.io
  name: Status
  logoUrl: https://argusbackup.io/img/wordmark-status.png
  faviconSvg: https://argusbackup.io/img/favicon.svg
  introTitle: "**Argus Backup** — live status"
  introMessage: Independent, external uptime monitoring of the Argus Backup platform, measured every 5 minutes from GitHub's infrastructure.
  navbar:
    - title: Status
      href: /
    - title: argusbackup.io
      href: https://argusbackup.io
  theme: dark

# storings-issues niet automatisch toewijzen
assignees: []
